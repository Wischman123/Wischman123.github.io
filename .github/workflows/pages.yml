# pages.yml — build the site and deploy it to GitHub Pages.
#
# TWO JOBS, NOT ONE (showcase_site_architecture_v1, D1.1 step 1).
#
#   build   runs on ANY branch / PR. Assembles _site/ and runs THE GATE
#           (build.py stages 0-6), then uploads the Pages artifact.
#   deploy  needs: build, and `if: github.ref == 'refs/heads/main'`.
#           It is the ONLY job that can publish.
#
# So a branch push PROVES the build and the gate green without touching the live
# site — and a red gate means the deploy job never starts. That is the whole point:
# with `actions/deploy-pages`, once the deploy job runs the artifact IS live, and a
# later check can only turn the workflow red, never un-deploy.
#
# WHAT A BRANCH RUN CANNOT PROVE, stated honestly: `actions/deploy-pages` works only
# when Pages `build_type == workflow`, and the `github-pages` environment restricts
# deployments to the default branch. So on a branch the BUILD and the GATE are
# proven and the artifact uploads; the DEPLOY job is first exercised on main.
#
# NOT peaceiris: that pushes build output to a branch, recreating the
# committed-build-output artifact this plan exists to eliminate.

name: Pages

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # THE ANALYTICS SEAM (E2.1). One env var, read by build.py stage 4b (which
    # INJECTS the tag) and by verify_live.py (which ASSERTS the coverage) — so the
    # build and its gate can never disagree about which mode this tree is.
    #
    # JOB-LEVEL, NOT STEP-LEVEL, AND THAT IS LOAD-BEARING: the determinism step
    # below RE-ASSEMBLES _site/ after the gate, and that re-assembled tree is what
    # `upload-pages-artifact` ships. Scope this to the `--check` step only and CI
    # would gate a TAGGED tree, then upload an UNTAGGED one — a green gate proving
    # coverage the deployed site does not have.
    #
    # UNSET => empty => analytics OFF => no tag, and the gate asserts that inverse.
    # That is the CURRENT state and it is deliberate: the GoatCounter site does not
    # exist yet, and a tag carrying a placeholder code is worse than no tag (it
    # collects nothing while the gate reports full coverage). Creating the site is
    # Brendan's to do; when it exists, setting the repo variable
    # `SHOWCASE_ANALYTICS_SITE` to the bare site code turns analytics on with NO
    # code change and NO re-publish of the mirror.
    env:
      SHOWCASE_ANALYTICS_SITE: ${{ vars.SHOWCASE_ANALYTICS_SITE }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The source-discipline check diffs the PUSHED COMMIT RANGE (never a
          # scan of the tracked tree — the old published pages are still
          # tracked as the D1.1 rollback target until D1.2, so a state scan
          # would be red on every push). A ranged diff needs history.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: No generated HTML in source (D2 — commit-range scoped)
        # The CI half of .githooks/pre-commit: ONE implementation
        # (check_source_html.py), re-scoped from "staged" to "pushed range".
        # "Staged" is not a concept CI has. workflow_dispatch has no range at
        # all, so there is nothing to check (the commits it builds were all
        # checked by the pushes that created them).
        if: github.event_name != 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi
          python check_source_html.py --range "$RANGE"

      - name: Install the build's only dependency
        # stage 0 validates the committed JSON against the VENDORED pydantic model.
        # Nothing else is needed: the build is stdlib + pydantic, by design.
        run: python -m pip install --quiet "pydantic>=2,<3"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # PINNED FALSE ON PURPOSE. `enablement: true` flips the repo's Pages
          # source to Actions via the API AS A SIDE EFFECT — it would open the
          # one-way door from inside a branch run. The flip is a deliberate,
          # ordered, human step (D1.1 step 2).
          enablement: false

      - name: Build + THE GATE (build.py stages 0-6)
        run: python build.py --check

      - name: Double-build determinism (D2 — era-2 check)
        # Two more assemblies of _site/, byte-compared under the ONE named
        # exclusion (generated_at). Deterministic => the tree this leaves
        # behind is identical to the gated one above, so the upload below
        # ships exactly what the gate proved. E2.2 extends this to the
        # three-build matrix when the analytics flag exists.
        run: python build.py --determinism

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    # STAGE 7 — an ALARM, not a gate. It runs AFTER the deploy, so it cannot
    # prevent one; a red here means: revert the source commit and re-run the
    # workflow, which re-deploys the previous good artifact.
    needs: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # The SAME seam as the build job, and for a sharper reason: this crawls the
    # DEPLOYED pages. With analytics on, the live pages carry the tag — so a smoke
    # run that could not see the flag would assert the flag-OFF inverse ("no page
    # carries a tag") against a correctly-tagged site and go red on every deploy.
    env:
      SHOWCASE_ANALYTICS_SITE: ${{ vars.SHOWCASE_ANALYTICS_SITE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for the CDN to settle
        run: sleep 30
      - name: Post-deploy smoke (build.py stage 7)
        run: python build.py --smoke --base-url "https://wischman123.github.io"
